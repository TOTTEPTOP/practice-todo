<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Статистика</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 0 auto; padding: 20px; }
        nav a { margin-right: 10px; }
        .stat { font-size: 24px; margin: 20px 0; padding: 20px; background: #f0f0f0; border-radius: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Главная</a> |
        <a href="about.html">О проекте</a> |
        <a href="stats.html">Статистика</a>
    </nav>
    
    <h1>Статистика продуктивности</h1>
    <div class="stat" id="statsInfo">Загрузка...</div>
    
    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let total = tasks.length;
        let done = tasks.filter(t => t.done).length;
        let percent = total === 0 ? 0 : Math.round(done / total * 100);
        document.getElementById('statsInfo').innerHTML = `
            Всего задач: ${total}<br>
            Выполнено: ${done}<br>
            Прогресс: ${percent}%
        `;
    </script>
</body>
</html>
